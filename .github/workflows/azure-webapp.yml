name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: student-resume-portal
  AZURE_WEBAPP_PACKAGE_PATH: .
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python version
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Create and start virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate

    - name: Install dependencies
      run: |
        source venv/bin/activate
        pip install -r requirements.txt
        pip install flask gunicorn

    - name: Run tests
      run: |
        source venv/bin/activate
        # Add your test command here if you have tests
        # python -m pytest tests/
        echo "No tests configured yet"

    - name: Create deployment package
      run: |
        source venv/bin/activate
        # Create deployment zip excluding unnecessary files
        zip -r deployment-package.zip . -x "*.git*" "*venv*" "*tests*" "*.md" ".dockerignore" "deployment-package.zip"

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: deployment-package.zip

    - name: Clean up deployment package
      if: always()
      run: |
        rm -f deployment-package.zip

    - name: Deployment summary
      if: success()
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 Web App: ${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "📍 Region: Central India"
        echo "🐳 Runtime: Python ${{ env.PYTHON_VERSION }}"
        echo "⏰ Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  alternative-docker-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Azure Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/student-resume-portal:latest
        cache-from: type=registry,ref=${{ secrets.AZURE_CONTAINER_REGISTRY }}/student-resume-portal:buildcache
        cache-to: type=registry,ref=${{ secrets.AZURE_CONTAINER_REGISTRY }}/student-resume-portal:buildcache,mode=max

    - name: Deploy to Azure Web App from Container
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/student-resume-portal:latest